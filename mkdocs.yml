site_name: "Hinduism: A Complete Journey"
site_description: "A comprehensive, AI-assisted scholarly exploration of Hinduism"
site_author: "AI Scholar Team"
site_url: "https://ajaykumarsoma.github.io/Book-Hinduisam"
repo_url: "https://github.com/ajaykumarsoma/Book-Hinduisam"
repo_name: "Book-Hinduisam"

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Noto Serif  # More readable serif font, excellent for long-form content
    code: Fira Code   # Better code font with ligatures
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    # - navigation.expand  # REMOVED: This auto-expands all sections
    - navigation.collapse  # ADDED: Enables collapsible navigation - click to expand/collapse
    - navigation.instant  # ADDED: Instant loading without full page reload
    - navigation.instant.prefetch  # ADDED: Prefetch pages on hover for faster loading
    - navigation.instant.progress  # ADDED: Show progress bar for page loads
    - navigation.top  # Back to top button
    - navigation.footer  # Previous/Next page navigation
    - navigation.indexes  # Section index pages
    - navigation.tracking  # URL updates as you scroll
    - search.highlight  # Highlight search terms
    - search.suggest  # Search suggestions
    - search.share  # Share search results
    - content.code.copy  # Copy code button
    - content.code.annotate  # Code annotations
    - content.tabs.link  # Link content tabs
    - toc.follow  # TOC follows scroll
    - toc.integrate  # Integrate TOC into navigation
  icon:
    repo: fontawesome/brands/github
    logo: material/om
  language: en

plugins:
  - search:
      lang:
        - en
        - te
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          site_name: "Hinduism: A Complete Journey"
        - locale: te
          name: తెలుగు (Telugu)
          build: true
          site_name: "హిందూ ధర్మం: సంపూర్ణ ప్రయాణం"
          nav_translations:
            Home: హోమ్
            About: గురించి
            About This Book: ఈ పుస్తకం గురించి
            How It Was Written: ఇది ఎలా వ్రాయబడింది
            Contribute: సహకరించండి
            Chapters: అధ్యాయాలు
            References: సూచనలు
            Complete Bibliography: పూర్తి గ్రంథ సూచిక
            Resources: వనరులు
            Sanskrit Glossary: సంస్కృత శబ్ద కోశం
            Bibliography: గ్రంథ సూచిక
            Image Guide: చిత్ర మార్గదర్శి
            Download: డౌన్‌లోడ్
            PDF Version: PDF వెర్షన్

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ajaykumarsoma/Book-Hinduisam
      name: Source Code on GitHub
    - icon: fontawesome/solid/book
      link: https://ajaykumarsoma.github.io/Book-Hinduisam
      name: Read Online
  generator: false
  alternate:
    - name: English
      link: /Book-Hinduisam/
      lang: en
    - name: తెలుగు (Telugu)
      link: /Book-Hinduisam/te/
      lang: te

extra_css:
  - stylesheets/extra.css
  - stylesheets/custom.css  # Wikipedia-style readability overrides

nav:
  - Home: index.md
  - About:
    - About This Book: about.md
    - How It Was Written: methodology.md
    - Contribute: contributing.md
  - Chapters:
    - chapters/index.md
    - Chapter 0 - Etymology (War of Words): chapters/chapter_00_etymology_war_of_words.md
    - Chapter 1 - Prāṇa Pratiṣṭhā: chapters/chapter_01_prana_pratishtha.md
    - Chapter 2 - Temple Worship Q&A: chapters/chapter_02_temple_worship_questions.md
    - Chapter 3 - Pagan Foundations: chapters/chapter_03_pagan_roots_abrahamic.md
    - Chapter 4 - Atheist/Communist Hypocrisy: chapters/chapter_04_atheist_communist_hypocrisy.md
    - Chapter 5 - Definition of Hindu (Bīja-Mantra Theory): chapters/chapter_05_definition_hindu.md
    - Chapter 6 - Religion vs Cult vs Matham vs Dharmam: chapters/chapter_06_religion_cult_matham_dharmam.md
    - Chapter 7 - Monotheism vs Polytheism (Q&A Defense): chapters/chapter_07_monotheism_polytheism_qna.md
    - Chapter 8 - Wendy Doniger Criticisms (Question Bank): chapters/chapter_08_wendy_doniger_criticisms.md
    - Chapter 9 - Shiva Purana Linga Truth (Darukavana Refutation): chapters/chapter_09_shiva_purana_linga_truth.md
  - References:
    - Complete Bibliography: references/bibliography.md
  - Resources:
    - Sanskrit Glossary: resources/glossary.md
    - Bibliography: resources/bibliography.md
    - Image Guide: resources/image-guide.md
  - Download:
    - PDF Version: download.md
